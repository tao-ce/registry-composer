on:
  push:
    branches:
      - main

env:
  STATIS_PREFIX: main

jobs:
  satis:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 1

    - uses: actions/checkout@v6
      with:
        path: public
        ref: github-pages
        fetch-depth: 1

    - run: |
        git config --global --add safe.directory '*'

    - uses: docker://ghcr.io/composer/satis:latest
      env:
        HOME: /github/home
        STATIS_HOMEPAGE: https://tao-ce.github.io/registry-composer/${{ env.STATIS_PREFIX }}
      with:
        args: --ansi -vvv -n build satis.json public/${{ env.STATIS_PREFIX }}
      

    - working-directory: public
      run: |
        git config user.name "Github Action satis update"
        git config user.email "<>"
        git add .
        git commit -m 'ci: satis update'
