on:
  push:
    branches:
      - main

env:
  SATIS_PREFIX: main

jobs:
  satis:
    runs-on: ubuntu-latest
    container: ghcr.io/composer/satis:latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 1
        set-safe-directory: '*'

    - uses: actions/checkout@v6
      with:
        path: public
        ref: github-pages
        fetch-depth: 1
        set-safe-directory: '*'

    - run: |
        export SATIS_HOMEPAGE=https://tao-ce.github.io/registry-composer/${{ env.SATIS_PREFIX }}
        /satis/bin/satis --ansi -vvv -n build satis.json public/${{ env.SATIS_PREFIX }}
      

    - working-directory: public
      run: |
        git config user.name "Github Action satis update"
        git config user.email "<>"
        git add .
        git commit -m 'ci: satis update'
